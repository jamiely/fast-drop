name: Release Electron (Windows)

permissions:
  contents: write

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ['main']
  release:
    types: [published]

jobs:
  windows-build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run quality gate
        run: npm run check

      - name: Build web assets
        run: npm run build

      - name: Desktop smoke check
        run: npm run electron:smoke

      - name: Package Windows app
        run: npm run build:electron:win

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            dist_electron/*.exe
            dist_electron/*.zip
            dist_electron/*.yml

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-windows-artifacts
          path: dist_electron
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-electron-diagnostics
          path: |
            dist_electron
            test-results
            playwright-report
          if-no-files-found: warn
          retention-days: 14
