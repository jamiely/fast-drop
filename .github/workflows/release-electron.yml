name: Release Electron (Desktop)

permissions:
  contents: write

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'electron/**'
      - 'scripts/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - '.github/workflows/release-electron.yml'
  push:
    branches: ['main']
    paths:
      - 'src/**'
      - 'electron/**'
      - 'scripts/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - '.github/workflows/release-electron.yml'

jobs:
  desktop-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            buildScript: build:electron:win
            artifactName: electron-windows-artifacts
            runSmoke: true
          - os: macos-latest
            platform: mac
            buildScript: build:electron:mac
            artifactName: electron-macos-artifacts
            runSmoke: true
          - os: ubuntu-latest
            platform: linux
            buildScript: build:electron:linux
            artifactName: electron-linux-artifacts
            runSmoke: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run check

      - name: Build web assets
        run: npm run build

      - name: Desktop smoke check
        if: matrix.runSmoke
        run: npm run electron:smoke

      - name: Package desktop app
        run: npm run ${{ matrix.buildScript }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: dist_electron
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-electron-diagnostics-${{ matrix.platform }}
          path: |
            dist_electron
            test-results
            playwright-report
          if-no-files-found: warn
          retention-days: 14

  publish-latest:
    needs: desktop-build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-windows-artifacts
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-macos-artifacts
          path: release-assets/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-linux-artifacts
          path: release-assets/linux

      - name: Publish rolling latest prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          body: |
            Automated rolling desktop builds from commit `${{ github.sha }}`.
          files: |
            release-assets/windows/*.exe
            release-assets/windows/latest.yml
            release-assets/macos/*.dmg
            release-assets/macos/*.zip
            release-assets/macos/latest-mac.yml
            release-assets/linux/*.AppImage
            release-assets/linux/*.tar.gz
            release-assets/linux/latest-linux.yml
          overwrite_files: true
